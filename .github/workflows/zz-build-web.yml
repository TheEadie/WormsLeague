name: ZZ - Build - Web
permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-web:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Build
        run: make web.build
      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: .artifacts/web/
