name: ZZ - Build - Web
permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-web:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Lint
        run: make web.lint
      - name: Build
        run: make web.build
      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: .artifacts/web/
