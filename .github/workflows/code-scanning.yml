name: "Code - Scanning"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 13 * * 6'

permissions:
  security-events: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      csharp: ${{ steps.filter.outputs.csharp }}
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      actions: ${{ steps.filter.outputs.actions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Filter
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            csharp:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.sln'
              - '**/Directory.Build.props'
              - '**/Directory.Build.targets'
              - '**/global.json'
            javascript-typescript:
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/package.json'
              - '**/package-lock.json'
            actions:
              - '.github/workflows/**'
              - '.github/actions/**'

  roslyn:
    name: Roslyn
    needs: detect-changes
    if: needs.detect-changes.outputs.csharp == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Inspections
        run: |
          mkdir -p sarif
          dotnet build Worms.sln /p:Sarif=true
          dotnet tool install --local Sarif.Multitool
          dotnet sarif merge sarif/*.sarif --recurse true --output-file=roslyn.sarif

      - name: Remove suppressed results
        run: |
          jq '.runs[].results |= map(select(has("suppressions") == false or (.suppressions | length) == 0))' roslyn.sarif > roslyn.filtered.sarif
          mv roslyn.filtered.sarif roslyn.sarif

      - name: Check for warnings
        run: |
          RESULTS=$(jq '[.runs[].results[]] | length' roslyn.sarif)
          if [ "$RESULTS" -gt 0 ]; then
            echo "::error::Roslyn found $RESULTS warning(s)"
            exit 1
          fi

      - name: Upload Roslyn SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: roslyn.sarif

  jetbrains:
    name: Jetbrains
    needs: detect-changes
    if: needs.detect-changes.outputs.csharp == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Inspections
        run: |
          dotnet tool install --local JetBrains.ReSharper.GlobalTools
          dotnet jb inspectcode Worms.sln --output=jetbrains.sarif --format=sarif

      - name: Check for warnings
        run: |
          RESULTS=$(jq '[.runs[].results[]] | length' jetbrains.sarif)
          if [ "$RESULTS" -gt 0 ]; then
            echo "::error::JetBrains InspectCode found $RESULTS warning(s)"
            exit 1
          fi

      - name: Upload JetBrains SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: jetbrains.sarif

  codeql-actions:
    name: CodeQL (actions)
    needs: detect-changes
    if: needs.detect-changes.outputs.actions == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: actions
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:actions"

  codeql-csharp:
    name: CodeQL (csharp)
    needs: detect-changes
    if: needs.detect-changes.outputs.csharp == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
        build-mode: manual

    - name: Build (csharp)
      run: dotnet build Worms.sln

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:csharp"

  codeql-javascript-typescript:
    name: CodeQL (javascript-typescript)
    needs: detect-changes
    if: needs.detect-changes.outputs.javascript-typescript == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  eslint:
    name: ESLint
    needs: detect-changes
    if: needs.detect-changes.outputs.javascript-typescript == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
      - name: Install Dependencies
        run: cd src/Worms.Hub.Web && npm ci
      - name: Run ESLint
        run: cd src/Worms.Hub.Web && npx eslint src --format @microsoft/eslint-formatter-sarif --output-file eslint.sarif
      - name: Upload ESLint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: src/Worms.Hub.Web/eslint.sarif

  prettier:
    name: Prettier
    needs: detect-changes
    if: needs.detect-changes.outputs.javascript-typescript == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
      - name: Install Dependencies
        run: cd src/Worms.Hub.Web && npm ci
      - name: Run Prettier
        run: cd src/Worms.Hub.Web && npx prettier --check src

  overall-scan:
    name: Overall Scan
    if: always()
    needs: [detect-changes, roslyn, jetbrains, codeql-actions, codeql-csharp, codeql-javascript-typescript, eslint, prettier]
    runs-on: ubuntu-latest
    steps:
      - name: Check all scans passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more code scanning jobs failed"
            exit 1
          fi
      - uses: Kesin11/actions-timeline@v3
        if: always()
        with:
          show-waiting-runner: true
