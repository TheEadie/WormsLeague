name: Deploy
permissions:
  contents: read
  pull-requests: write

on:
  push:

jobs:
  changes:
    name: Detect Changes
    uses: ./.github/workflows/zz-detect-changes.yml

  deploy-preview:
    name: Deploy Preview
    needs: changes
    if: needs.changes.outputs.deployment == 'true' && github.ref != 'refs/heads/main'
    uses: ./.github/workflows/zz-deploy-preview.yml
    secrets: inherit

  deploy:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deployment == 'true' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: |
            {
              "clientSecret":  "${{ secrets.ARM_CLIENT_SECRET }}",
              "subscriptionId":  "${{ secrets.ARM_SUBSCRIPTION_ID }}",
              "tenantId":  "${{ secrets.ARM_TENANT_ID }}",
              "clientId":  "${{ secrets.ARM_CLIENT_ID }}"
            }

      - name: Pulumi Up
        id: pulumi-up
        uses: pulumi/actions@v7
        with:
          command: up
          stack-name: prod
          work-dir: deployment/Worms.Hub.Infrastructure
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run Flyway Migrate
        uses: docker://redgate/flyway:12
        with:
          args: >-
            info
            migrate
            info
            -workingDirectory=/github/workspace/src/database
            -environment=production
            -url="${{ steps.pulumi-up.outputs.database-jdbc }}"
            -user="${{ steps.pulumi-up.outputs.database-user }}"
            -password="${{ steps.pulumi-up.outputs.database-password }}"
            -target=${{ steps.pulumi-up.outputs.database-version }}
        env:
          FLYWAY_EMAIL: ${{ secrets.FLYWAY_EMAIL }}
          FLYWAY_TOKEN: ${{ secrets.FLYWAY_TOKEN }}

  overall-deploy:
    name: Overall Deploy
    if: always()
    needs: [changes, deploy, deploy-preview]
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more build jobs failed"
            exit 1
          fi
      - uses: Kesin11/actions-timeline@v3
        if: always()
        with:
          show-waiting-runner: true
