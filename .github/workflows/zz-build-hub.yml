name: ZZ - Build - Hub
permissions:
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      wa-runner-test:
        type: string
        required: true

jobs:
  build-gateway:
    name: Gateway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Package
        run: |
          make gateway.package

  build-wa-runner:
    name: WA Runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Package
        run: |
          make wa-runner.package

  test-wa-runner:
    name: WA Runner Integration Test
    needs: build-wa-runner
    if: ${{ inputs.wa-runner-test == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download WA game files
        run: |
          bash build/download-wa-game.sh "${{ secrets.WORMSHUB_CLIENTID }}" "${{ secrets.WORMSHUB_CLIENTSECRET }}" "${{ runner.temp }}/wa-game"

      - name: Run integration test
        env:
          WA_GAME_PATH: ${{ runner.temp }}/wa-game
        run: |
          dotnet test src/Worms.Hub.Armageddon.Runner.Tests --filter Category=Integration

  build-database:
    name: Database
    runs-on: ubuntu-latest
    env:
      FLYWAY_EMAIL: ${{ secrets.FLYWAY_EMAIL }}
      FLYWAY_TOKEN: ${{ secrets.FLYWAY_TOKEN }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: worms
          POSTGRES_PASSWORD: worms
          POSTGRES_DB: worms
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test Flyway Migrations
        uses: docker://redgate/flyway:12
        with:
          args: >-
            -workingDirectory=/github/workspace/src/database
            -environment=build
            info
            migrate
            info
