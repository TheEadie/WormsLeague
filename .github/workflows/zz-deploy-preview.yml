name: ZZ - Deploy Preview
permissions:
  contents: read
  pull-requests: write

on:
  workflow_call:

jobs:
  preview:
    name: Azure Infrastructure
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: worms
          POSTGRES_PASSWORD: worms
          POSTGRES_DB: worms
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - name: Preview Azure Infrastructure
        uses: pulumi/actions@v7
        id: preview
        with:
          command: preview
          stack-name: prod
          work-dir: deployment/Worms.Hub.Infrastructure
          comment-on-pr: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Create Reports Folder
        run: mkdir src/database/reports
      - name: Get Database Version
        id: db-version
        run: |
          version=$(python3 -c "import yaml; c=yaml.safe_load(open('deployment/Worms.Hub.Infrastructure/Pulumi.yaml')); print(c['config']['worms-hub:database-version'])")
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Run Flyway Report
        uses: docker://redgate/flyway:12.7
        with:
          args: >-
            check -changes -drift
            -workingDirectory=/github/workspace/src/database
            -check.buildEnvironment=build
            -environment=production
            -url="${{ steps.preview.outputs.database-jdbc }}"
            -user="${{ steps.preview.outputs.database-user }}"
            -password="${{ steps.preview.outputs.database-password }}"
            -target=${{ steps.db-version.outputs.version }}
            -reportFilename="/github/workspace/src/database/reports/report.htm"
        env:
          FLYWAY_EMAIL: ${{ secrets.FLYWAY_EMAIL }}
          FLYWAY_TOKEN: ${{ secrets.FLYWAY_TOKEN }}
      - name: Get Summary
        id: summary
        run: |
          {
            echo 'summary<<EOF'
            build/flyway-summary.sh src/database/reports/report.json
            echo EOF
          } >> $GITHUB_OUTPUT
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          hide_and_recreate: true
          hide_classify: "OUTDATED"
          message: |
            ${{ steps.summary.outputs.summary }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: Database Report
          path: src/database/reports/
