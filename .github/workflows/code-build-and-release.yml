name: "Code - Build and Release"
permissions:
  contents: write
  pull-requests: write
  security-events: write

on:
  push:

jobs:
  changes:
    name: Detect Changes
    uses: ./.github/workflows/zz-detect-changes.yml

  build-hub:
    name: Build - Hub
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/zz-build-hub.yml
    with:
      wa-runner-test: ${{ needs.changes.outputs.wa-runner-test }}
    secrets: inherit

  build-cli:
    name: Build - CLI
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/zz-build-cli.yml
    secrets: inherit

  build-web:
    name: Build - Web
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/zz-build-web.yml
    secrets: inherit

  release-hub:
    name: Release - Hub
    needs: [changes, build-hub]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/zz-release-hub.yml
    with:
      gateway-release: ${{ needs.changes.outputs.gateway-release }}
      wa-runner-release: ${{ needs.changes.outputs.wa-runner-release }}
    secrets: inherit

  release-cli:
    name: Release - CLI
    needs: [changes, build-cli]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/zz-release-cli.yml
    with:
      clis-release: ${{ needs.changes.outputs.clis-release }}
    secrets: inherit

  overall-build:
    name: Overall Build
    if: always()
    needs: [changes, build-hub, build-cli, build-web, release-cli, release-hub]
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more build jobs failed"
            exit 1
          fi
      - uses: Kesin11/actions-timeline@v3
        if: always()
        with:
          show-waiting-runner: true
