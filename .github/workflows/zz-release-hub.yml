name: ZZ - Release - Hub
permissions:
  contents: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      gateway-changed:
        type: string
        required: true
      wa-runner-changed:
        type: string
        required: true

jobs:

  release-gateway-github:
    name: Gateway - GitHub
    runs-on: ubuntu-latest
    if: ${{ inputs.gateway-changed == 'true' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Release
        run: |
          make gateway.release.github GITHUB_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  release-gateway-dockerhub:
    name: Gateway - DockerHub
    runs-on: ubuntu-latest
    if: ${{ inputs.gateway-changed == 'true' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: theeadie
          password: ${{ secrets.DockerHubAccessToken }}

      - name: Release
        run: |
          make gateway.release.dockerhub

  release-wa-runner-github:
    name: WA Runner - GitHub
    runs-on: ubuntu-latest
    if: ${{ inputs.wa-runner-changed == 'true' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Release
        run: |
          make wa-runner.release.github GITHUB_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  release-wa-runner-dockerhub:
    name: WA Runner - DockerHub
    runs-on: ubuntu-latest
    if: ${{ inputs.wa-runner-changed == 'true' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: theeadie
          password: ${{ secrets.DockerHubAccessToken }}

      - name: Release
        run: |
          make wa-runner.release.dockerhub
